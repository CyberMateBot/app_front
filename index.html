<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#0a0b10" />
    <title>CyberMate</title>
    <script src="https://telegram.org/js/telegram-web-app.js?59"></script>
    <script>
      (function () {
        var DESKTOP_PLATFORMS = { tdesktop: 1, macos: 1, web: 1, weba: 1, unigram: 1 };
        var PARENT_ORIGINS = [
          'https://web.telegram.org',
          'https://webk.telegram.org',
          'https://weba.telegram.org'
        ];

        var hash = window.location.hash.replace(/^#/, '');
        if (hash && hash.indexOf('tgWebApp') !== -1) {
          try { sessionStorage.setItem('cybermate.tg_launch_hash', hash); } catch (e) {}
        }

        function postFullscreen() {
          var envelope = JSON.stringify({
            eventType: 'web_app_request_fullscreen',
            eventData: {}
          });

          if (window.TelegramWebviewProxy && typeof window.TelegramWebviewProxy.postEvent === 'function') {
            window.TelegramWebviewProxy.postEvent('web_app_request_fullscreen', '{}');
            window.TelegramWebviewProxy.postEvent('web_app_request_viewport', '{}');
          }

          if (window.parent !== window) {
            try { window.parent.postMessage(envelope, '*'); } catch (e) {}
            for (var i = 0; i < PARENT_ORIGINS.length; i += 1) {
              try { window.parent.postMessage(envelope, PARENT_ORIGINS[i]); } catch (e) {}
            }
          }
        }

        function isDesktopPlatform(platform) {
          return !!DESKTOP_PLATFORMS[String(platform || '').toLowerCase()];
        }

        var tg = window.Telegram && window.Telegram.WebApp;
        if (!tg) {
          return;
        }

        tg.ready();
        tg.expand();

        var params = new URLSearchParams(hash);
        var platform = tg.platform || params.get('tgWebAppPlatform') || '';

        if (!isDesktopPlatform(platform)) {
          return;
        }

        if (typeof tg.requestFullscreen === 'function') {
          try { tg.requestFullscreen(); } catch (e) {}
        }

        postFullscreen();
        window.setTimeout(postFullscreen, 120);
        window.setTimeout(postFullscreen, 500);
      })();
    </script>
    <script>
      (function () {
        var key = 'cybermate-ui-theme';
        var theme = localStorage.getItem(key);
        if (theme !== 'light' && theme !== 'dark') {
          var legacy = localStorage.getItem('cybermate-theme');
          if (legacy === 'light' || legacy === 'dark') {
            theme = legacy;
            localStorage.setItem(key, legacy);
            localStorage.removeItem('cybermate-theme');
          }
        }
        if (theme !== 'light' && theme !== 'dark') {
          var tg = window.Telegram && window.Telegram.WebApp;
          if (tg && (tg.colorScheme === 'light' || tg.colorScheme === 'dark')) {
            theme = tg.colorScheme;
          }
        }
        if (theme !== 'light' && theme !== 'dark' && window.matchMedia) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (theme !== 'light' && theme !== 'dark') {
          theme = 'light';
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
